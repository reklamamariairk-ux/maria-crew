<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Maria Crew</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1a1a1a);
      --hint: var(--tg-theme-hint-color, #999);
      --link: var(--tg-theme-link-color, #e8553e);
      --btn: var(--tg-theme-button-color, #e8553e);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
      --accent: #e8553e;
      --gold: #f5a623;
      --green: #27ae60;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 70px;
    }

    /* ── Загрузка ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--secondary-bg);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Регистрация ── */
    #reg-screen {
      display: none;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .reg-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .reg-logo h1 { font-size: 28px; font-weight: 800; color: var(--accent); }
    .reg-logo p { color: var(--hint); margin-top: 6px; }
    .reg-label { font-size: 13px; color: var(--hint); margin-bottom: 6px; }
    .reg-select {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius);
      border: 1.5px solid var(--secondary-bg);
      background: var(--secondary-bg);
      color: var(--text);
      font-size: 16px;
      appearance: none;
      outline: none;
    }
    .reg-select:focus { border-color: var(--accent); }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--btn);
      color: var(--btn-text);
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-top: 24px;
      letter-spacing: 0.3px;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; }

    /* ── Основной экран ── */
    #app { display: none; }

    /* Header */
    .header {
      background: var(--btn);
      color: var(--btn-text);
      padding: 16px 16px 20px;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
      flex-shrink: 0;
    }
    .header-name { font-size: 17px; font-weight: 700; }
    .header-store { font-size: 13px; opacity: 0.85; margin-top: 2px; }
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-value { font-size: 22px; font-weight: 800; }
    .stat-label { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      padding: 0 12px;
      margin-top: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: var(--hint);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--btn);
      color: var(--btn-text);
    }

    /* Content */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* Cards section */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--hint);
      margin-bottom: 12px;
    }

    /* Collection grid */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .hero-card {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 12px 6px;
      text-align: center;
      position: relative;
    }
    .hero-card.owned { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
    .hero-card.mvp { background: linear-gradient(135deg, #fff8e1, #ffecb3); }
    .hero-icon { font-size: 28px; margin-bottom: 4px; }
    .hero-name { font-size: 10px; color: var(--text); line-height: 1.2; font-weight: 500; }
    .hero-card.owned .hero-name { font-weight: 700; }
    .hero-badge {
      position: absolute; top: 6px; right: 6px;
      width: 16px; height: 16px;
      background: var(--gold);
      border-radius: 50%;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Info cards */
    .info-card {
      background: var(--secondary-bg);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .info-card-title {
      font-size: 12px;
      color: var(--hint);
      margin-bottom: 4px;
    }
    .info-card-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }
    .info-card-sub { font-size: 13px; color: var(--hint); margin-top: 4px; }

    /* Coin history */
    .tx-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--secondary-bg);
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-label { font-size: 14px; }
    .tx-date { font-size: 12px; color: var(--hint); margin-top: 2px; }
    .tx-amount { font-size: 16px; font-weight: 700; }
    .tx-amount.pos { color: var(--green); }
    .tx-amount.neg { color: var(--accent); }

    /* Leaderboard */
    .lb-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--secondary-bg);
    }
    .lb-item:last-child { border-bottom: none; }
    .lb-rank { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
    .lb-name { flex: 1; font-size: 15px; font-weight: 600; }
    .lb-score { font-size: 14px; color: var(--hint); }
    .lb-mvp {
      background: var(--gold);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      margin-left: 4px;
    }
    .lb-me { background: var(--secondary-bg); border-radius: 10px; padding: 0 8px; }

    /* Store prizes */
    .prize-item {
      background: var(--secondary-bg);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .prize-name { font-size: 14px; font-weight: 600; }
    .prize-cost { font-size: 13px; color: var(--hint); margin-top: 2px; }
    .prize-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .prize-btn.can { background: var(--btn); color: var(--btn-text); }
    .prize-btn.cant { background: var(--secondary-bg); color: var(--hint); border: 1.5px solid var(--secondary-bg); }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid var(--secondary-bg);
      display: flex;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: none;
      background: transparent;
      color: var(--hint);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
    }
    .nav-btn .nav-icon { font-size: 22px; }
    .nav-btn.active { color: var(--btn); }

    .empty { text-align: center; color: var(--hint); padding: 40px 20px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%; transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Загрузка -->
<div id="loading">
  <div class="spinner"></div>
  <div style="color:var(--hint);font-size:14px">Загружаем...</div>
</div>

<!-- Регистрация -->
<div id="reg-screen">
  <div class="reg-logo">
    <h1>🍰 Maria Crew</h1>
    <p>Программа мотивации сотрудников</p>
  </div>
  <p id="reg-copy" style="color:var(--hint);line-height:1.45;margin-bottom:20px"></p>
  <div id="reg-store-wrap" style="margin-bottom:20px">
    <div class="reg-label">Выбери свою кондитерскую</div>
    <select id="reg-store" class="reg-select">
      <option value="">— выбери точку —</option>
    </select>
  </div>
  <button class="btn-primary" id="reg-btn" onclick="register()">Присоединиться к команде 🎉</button>
</div>

<!-- Основное приложение -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="avatar" id="avatar-text">?</div>
      <div>
        <div class="header-name" id="header-name">—</div>
        <div class="header-store" id="header-store">—</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-cards">—</div>
        <div class="stat-label">карточек</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-coins">—</div>
        <div class="stat-label">монет</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-heroes">—</div>
        <div class="stat-label">из 12 героев</div>
      </div>
    </div>
  </div>

  <!-- Контент -->
  <div style="padding-top:4px">
    <!-- Коллекция -->
    <div id="tab-collection" class="tab-content active">
      <div class="section-title" style="margin-top:12px">Герои коллекции</div>
      <div class="hero-grid" id="hero-grid">
        <div class="empty">Загружаем...</div>
      </div>
    </div>

    <!-- Монеты -->
    <div id="tab-coins" class="tab-content">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;margin-top:4px">
        <div class="info-card">
          <div class="info-card-title">Баланс</div>
          <div class="info-card-value" id="coins-balance">—</div>
          <div class="info-card-sub">монет</div>
        </div>
        <div class="info-card">
          <div class="info-card-title">За месяц</div>
          <div class="info-card-value" id="coins-monthly">—</div>
          <div class="info-card-sub">заработано</div>
        </div>
      </div>
      <div class="section-title">История</div>
      <div id="coins-history"><div class="empty">Загружаем...</div></div>
    </div>

    <!-- Рейтинг -->
    <div id="tab-rating" class="tab-content">
      <div class="section-title" style="margin-top:4px">Рейтинг точки</div>
      <div id="rating-list"><div class="empty">Загружаем...</div></div>
    </div>

    <!-- Магазин -->
    <div id="tab-store" class="tab-content">
      <div class="tabs" style="margin:4px 0 16px -16px;padding-left:0">
        <button class="tab-btn active" id="store-tab-cards" onclick="switchStoreTab('cards')">🃏 Карточки</button>
        <button class="tab-btn" id="store-tab-coins" onclick="switchStoreTab('coins')">💰 Монеты</button>
      </div>
      <div id="store-prizes"><div class="empty">Загружаем...</div></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-collection" onclick="switchTab('collection')">
      <span class="nav-icon">🃏</span>Коллекция
    </button>
    <button class="nav-btn" id="nav-coins" onclick="switchTab('coins')">
      <span class="nav-icon">💰</span>Монеты
    </button>
    <button class="nav-btn" id="nav-rating" onclick="switchTab('rating')">
      <span class="nav-icon">⭐</span>Рейтинг
    </button>
    <button class="nav-btn" id="nav-store" onclick="switchTab('store')">
      <span class="nav-icon">🛍</span>Магазин
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script src="main.js"></script>
</body>
</html>
